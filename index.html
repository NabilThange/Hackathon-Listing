<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hackathon Organizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏆 Hackathon Organizer</h1>
            <p class="subtitle">Total Events: <span id="totalEvents">7</span></p>
        </header>

        <div class="controls">
            <div class="view-toggle">
                <button id="listViewBtn" class="active">📋 List View</button>
                <button id="calendarViewBtn">📅 Calendar View</button>
            </div>
            <div class="sort-controls">
                <label>Sort by:</label>
                <select id="sortSelect">
                    <option value="eventDate">Event Date (Ascending)</option>
                    <option value="regDate">Registration Date (Ascending)</option>
                </select>
            </div>
        </div>

        <div id="listView" class="view active">
            <div id="hackathonList"></div>
        </div>

        <div id="calendarView" class="view">
            <div id="calendar"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
